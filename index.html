<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SHIELD — Brockway Command</title><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"><style>  :root {    --gold: #C9A84C;    --gold-dim: #8a6e2f;    --green: #00E5A0;    --red: #FF4060;    --bg: #080A0E;    --surface: #0D1117;    --surface2: #131920;    --border: rgba(201,168,76,0.15);    --text: #E8E2D4;    --muted: #5a5a6a;    --font-mono: 'Space Mono', monospace;    --font-display: 'Syne', sans-serif;  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {    background: var(--bg);    color: var(--text);    font-family: var(--font-mono);    min-height: 100vh;    overflow-x: hidden;  }
  /* Grid noise overlay */  body::before {    content: '';    position: fixed;    inset: 0;    background-image:      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);    background-size: 40px 40px;    pointer-events: none;    z-index: 0;  }
  .wrap {    position: relative;    z-index: 1;    max-width: 1200px;    margin: 0 auto;    padding: 24px 20px;  }
  /* HEADER */  header {    display: flex;    align-items: center;    justify-content: space-between;    margin-bottom: 32px;    padding-bottom: 20px;    border-bottom: 1px solid var(--border);  }
  .logo {    display: flex;    align-items: center;    gap: 14px;  }
  .logo-mark {    width: 40px;    height: 40px;    border: 2px solid var(--gold);    display: grid;    place-items: center;    position: relative;  }
  .logo-mark::before {    content: '';    position: absolute;    inset: 4px;    border: 1px solid var(--gold-dim);    opacity: 0.5;  }
  .logo-mark span {    font-family: var(--font-display);    font-weight: 800;    font-size: 18px;    color: var(--gold);    letter-spacing: -1px;  }
  .logo-text h1 {    font-family: var(--font-display);    font-weight: 800;    font-size: 18px;    color: var(--gold);    letter-spacing: 4px;    text-transform: uppercase;  }
  .logo-text p {    font-size: 10px;    color: var(--muted);    letter-spacing: 2px;    text-transform: uppercase;    margin-top: 2px;  }
  .header-right {    display: flex;    align-items: center;    gap: 20px;  }
  .pulse-dot {    width: 8px;    height: 8px;    border-radius: 50%;    background: var(--green);    box-shadow: 0 0 12px var(--green);    animation: pulse 2s infinite;  }
  .pulse-dot.offline { background: var(--red); box-shadow: 0 0 12px var(--red); animation: none; }
  @keyframes pulse {    0%, 100% { opacity: 1; transform: scale(1); }    50% { opacity: 0.5; transform: scale(0.85); }  }
  #status-text {    font-size: 11px;    color: var(--muted);    letter-spacing: 1px;    text-transform: uppercase;  }
  #last-update {    font-size: 10px;    color: var(--muted);    letter-spacing: 0.5px;  }
  /* ACCOUNT BANNER */  .account-banner {    background: var(--surface);    border: 1px solid var(--border);    padding: 20px 28px;    display: grid;    grid-template-columns: repeat(4, 1fr);    gap: 0;    margin-bottom: 24px;    position: relative;    overflow: hidden;  }
  .account-banner::before {    content: '';    position: absolute;    top: 0; left: 0; right: 0;    height: 1px;    background: linear-gradient(90deg, transparent, var(--gold), transparent);  }
  .banner-stat {    padding: 0 24px;    border-right: 1px solid var(--border);  }
  .banner-stat:first-child { padding-left: 0; }  .banner-stat:last-child { border-right: none; }
  .banner-stat label {    display: block;    font-size: 10px;    color: var(--muted);    letter-spacing: 2px;    text-transform: uppercase;    margin-bottom: 6px;  }
  .banner-stat .value {    font-family: var(--font-display);    font-size: 24px;    font-weight: 700;    color: var(--text);    letter-spacing: -0.5px;  }
  .banner-stat .value.pos { color: var(--green); }  .banner-stat .value.neg { color: var(--red); }
  .banner-stat .sub {    font-size: 11px;    color: var(--muted);    margin-top: 4px;  }
  /* ENGINES GRID */  .engines {    display: grid;    grid-template-columns: 1fr 1fr;    gap: 16px;    margin-bottom: 24px;  }
  .engine-card {    background: var(--surface);    border: 1px solid var(--border);    padding: 24px;    position: relative;    overflow: hidden;  }
  .engine-card::after {    content: '';    position: absolute;    top: 0; left: 0; bottom: 0;    width: 2px;  }
  .engine-card.axiom::after { background: var(--gold); }  .engine-card.pv::after { background: #7B5CF0; }
  .engine-header {    display: flex;    align-items: center;    justify-content: space-between;    margin-bottom: 20px;  }
  .engine-name {    font-family: var(--font-display);    font-weight: 800;    font-size: 13px;    letter-spacing: 3px;    text-transform: uppercase;  }
  .engine-card.axiom .engine-name { color: var(--gold); }  .engine-card.pv .engine-name { color: #7B5CF0; }
  .engine-badge {    font-size: 10px;    padding: 3px 10px;    border-radius: 2px;    letter-spacing: 1px;    text-transform: uppercase;  }
  .badge-active { background: rgba(0,229,160,0.12); color: var(--green); border: 1px solid rgba(0,229,160,0.3); }  .badge-wiped { background: rgba(255,64,96,0.12); color: var(--red); border: 1px solid rgba(255,64,96,0.3); }  .badge-stopped{ background: rgba(255,64,96,0.12); color: var(--red); border: 1px solid rgba(255,64,96,0.3); }
  .engine-stats {    display: grid;    grid-template-columns: 1fr 1fr;    gap: 16px;  }
  .stat-box {    padding: 14px;    background: var(--surface2);    border: 1px solid rgba(255,255,255,0.04);  }
  .stat-box label {    display: block;    font-size: 9px;    color: var(--muted);    letter-spacing: 2px;    text-transform: uppercase;    margin-bottom: 6px;  }
  .stat-box .val {    font-family: var(--font-display);    font-size: 20px;    font-weight: 700;    color: var(--text);  }
  .stat-box .val.pos { color: var(--green); }  .stat-box .val.neg { color: var(--red); }
  /* BAR */  .engine-bar {    margin-top: 16px;  }
  .bar-label {    display: flex;    justify-content: space-between;    font-size: 10px;    color: var(--muted);    margin-bottom: 6px;  }
  .bar-track {    height: 3px;    background: rgba(255,255,255,0.06);    border-radius: 2px;    overflow: hidden;  }
  .bar-fill {    height: 100%;    border-radius: 2px;    transition: width 0.6s ease;  }
  .axiom .bar-fill { background: var(--gold); }  .pv .bar-fill { background: #7B5CF0; }  .bar-fill.danger { background: var(--red); }
  /* STATUS ROW */  .status-row {    display: grid;    grid-template-columns: repeat(4, 1fr);    gap: 12px;    margin-bottom: 24px;  }
  .status-tile {    background: var(--surface);    border: 1px solid var(--border);    padding: 16px 18px;    display: flex;    align-items: center;    gap: 12px;  }
  .status-icon {    font-size: 18px;    line-height: 1;  }
  .status-tile .st-label {    font-size: 9px;    color: var(--muted);    letter-spacing: 2px;    text-transform: uppercase;    display: block;    margin-bottom: 4px;  }
  .status-tile .st-val {    font-family: var(--font-display);    font-size: 13px;    font-weight: 700;    letter-spacing: 1px;  }
  .st-val.ok { color: var(--green); }  .st-val.warn { color: var(--gold); }  .st-val.danger { color: var(--red); }
  /* FOOTER */  footer {    margin-top: 32px;    padding-top: 20px;    border-top: 1px solid var(--border);    display: flex;    justify-content: space-between;    align-items: center;  }
  footer p {    font-size: 10px;    color: var(--muted);    letter-spacing: 1px;    text-transform: uppercase;  }
  /* LOADING */  .loading {    display: flex;    flex-direction: column;    align-items: center;    justify-content: center;    min-height: 60vh;    gap: 16px;  }
  .loading-ring {    width: 48px;    height: 48px;    border: 2px solid var(--border);    border-top-color: var(--gold);    border-radius: 50%;    animation: spin 0.8s linear infinite;  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading p {    font-size: 11px;    color: var(--muted);    letter-spacing: 3px;    text-transform: uppercase;  }
  /* ERROR */  .error-banner {    background: rgba(255,64,96,0.08);    border: 1px solid rgba(255,64,96,0.3);    padding: 16px 20px;    margin-bottom: 20px;    font-size: 12px;    color: var(--red);    letter-spacing: 0.5px;    display: none;  }
  /* RESPONSIVE */  @media (max-width: 768px) {    .account-banner { grid-template-columns: 1fr 1fr; }    .banner-stat:nth-child(2) { border-right: none; }    .banner-stat:nth-child(3) { border-right: 1px solid var(--border); }    .engines { grid-template-columns: 1fr; }    .status-row { grid-template-columns: 1fr 1fr; }  }
  @media (max-width: 480px) {    .account-banner { grid-template-columns: 1fr; }    .banner-stat { border-right: none; border-bottom: 1px solid var(--border); padding: 12px 0; }    .banner-stat:last-child { border-bottom: none; }    .status-row { grid-template-columns: 1fr; }    .header-right { gap: 12px; }  }
  /* PROFILE TABS */  .profile-tab {    background: var(--surface);    border: 1px solid var(--border);    color: var(--muted);    font-family: var(--font-mono);    font-size: 11px;    letter-spacing: 1px;    text-transform: uppercase;    padding: 8px 16px;    cursor: pointer;    transition: all 0.2s;  }  .profile-tab:hover { border-color: var(--gold-dim); color: var(--text); }  .profile-tab.active { border-color: var(--gold); color: var(--gold); background: rgba(201,168,76,0.08); }
  /* LOGIN GATE */  #login-gate {    position: fixed;    inset: 0;    background: var(--bg);    z-index: 9999;    display: flex;    align-items: center;    justify-content: center;    flex-direction: column;  }
  .login-box {    border: 1px solid var(--border);    background: var(--surface);    padding: 48px 40px;    width: 100%;    max-width: 420px;    position: relative;    overflow: hidden;  }
  .login-box::before {    content: '';    position: absolute;    top: 0; left: 0; right: 0;    height: 2px;    background: linear-gradient(90deg, transparent, var(--gold), transparent);  }
  .login-logo {    display: flex;    align-items: center;    gap: 14px;    margin-bottom: 36px;  }
  .login-mark {    width: 44px;    height: 44px;    border: 2px solid var(--gold);    display: grid;    place-items: center;    font-family: var(--font-display);    font-weight: 800;    font-size: 20px;    color: var(--gold);  }
  .login-title {    font-family: var(--font-display);    font-weight: 800;    font-size: 20px;    color: var(--gold);    letter-spacing: 4px;    text-transform: uppercase;  }
  .login-sub {    font-size: 10px;    color: var(--muted);    letter-spacing: 2px;    text-transform: uppercase;    margin-top: 3px;  }
  .login-label {    display: block;    font-size: 10px;    color: var(--muted);    letter-spacing: 2px;    text-transform: uppercase;    margin-bottom: 10px;  }
  .login-input {    width: 100%;    background: var(--surface2);    border: 1px solid var(--border);    color: var(--text);    font-family: var(--font-mono);    font-size: 16px;    padding: 14px 16px;    outline: none;    letter-spacing: 2px;    transition: border-color 0.2s;    box-sizing: border-box;  }
  .login-input:focus {    border-color: var(--gold);  }
  .login-input.error {    border-color: var(--red);    animation: shake 0.3s ease;  }
  @keyframes shake {    0%,100% { transform: translateX(0); }    25% { transform: translateX(-6px); }    75% { transform: translateX(6px); }  }
  .login-btn {    width: 100%;    margin-top: 16px;    background: var(--gold);    color: #000;    border: none;    font-family: var(--font-display);    font-weight: 800;    font-size: 13px;    letter-spacing: 3px;    text-transform: uppercase;    padding: 16px;    cursor: pointer;    transition: opacity 0.2s;  }
  .login-btn:hover { opacity: 0.85; }  .login-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .login-error {    margin-top: 12px;    font-size: 11px;    color: var(--red);    letter-spacing: 1px;    text-align: center;    min-height: 16px;  }
  .login-footer {    margin-top: 24px;    font-size: 10px;    color: var(--muted);    letter-spacing: 1px;    text-transform: uppercase;    text-align: center;  }
  .logout-btn {    font-size: 10px;    color: var(--muted);    letter-spacing: 1px;    text-transform: uppercase;    background: none;    border: none;    cursor: pointer;    padding: 4px 8px;  }
  .logout-btn:hover { color: var(--gold); }</style></head><body>
