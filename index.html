<!DOCTYPE html><html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shield — Brockway Command</title><style>

body {

  margin:0;

  background:#050607;

  color:#fff;

  font-family:monospace;

}



.center {

  display:flex;

  align-items:center;

  justify-content:center;

  height:100vh;

}



.box {

  background:#0A0B0D;

  padding:30px;

  border:1px solid #1C1D20;

  width:300px;

}



input {

  width:100%;

  padding:10px;

  margin-top:10px;

  background:black;

  border:1px solid #333;

  color:white;

}



button {

  width:100%;

  padding:10px;

  margin-top:15px;

  background:#0094FF;

  border:none;

  color:white;

  cursor:pointer;

}



#dash {

  display:none;

  padding:20px;

}



.card {

  border:1px solid #1C1D20;

  padding:15px;

  margin-bottom:10px;

}

</style></head><body><!-- LOGIN --><div id="login" class="center">

  <div class="box">

    <h3>SHIELD LOGIN</h3>

    <input id="keyInput" placeholder="Enter License Key"/>

    <button onclick="login()">Enter</button>

    <div id="error" style="color:red;margin-top:10px;"></div>

  </div>

</div><!-- DASHBOARD --><div id="dash">

  <h2>Dashboard</h2>

  <div id="accounts"></div>

</div><script>



// ===============================

// 🔐 KEYS

// ===============================

const CEO_KEY = "08028369764";

const MASTER_KEY = "08023034259";



// ===============================

// 🎯 ROLE DETECTION

// ===============================

function getRole(key) {

  if (key === MASTER_KEY) return "master";

  if (key === CEO_KEY) return "ceo";

  return "user";

}



// ===============================

// 🔑 LOGIN

// ===============================

function login() {

  const key = document.getElementById("keyInput").value.trim();

  const err = document.getElementById("error");



  if (!key) {

    err.textContent = "Enter key";

    return;

  }



  const role = getRole(key);



  sessionStorage.setItem("key", key);

  sessionStorage.setItem("role", role);



  document.getElementById("login").style.display = "none";

  document.getElementById("dash").style.display = "block";



  loadDashboard();

}



// ===============================

// 🌐 FETCH DATA (REPLACE URL)

// ===============================

async function fetchData() {

  try {

    const res = await fetch("https://shield-api-production-8317.up.railway.app/");

    return await res.json();

  } catch (e) {

    return [];

  }

}



// ===============================

// 🧠 FILTER LOGIC

// ===============================

function filterData(data, key, role) {

  if (role === "master") return data;



  if (role === "ceo") {

    return data.filter(d => d.license_hash === CEO_KEY);

  }



  return data.filter(d => d.license_hash === key);

}



// ===============================

// 📊 RENDER

// ===============================

function render(data) {

  const container = document.getElementById("accounts");

  container.innerHTML = "";



  if (!data.length) {

    container.innerHTML = "<p>No data</p>";

    return;

  }



  data.forEach(acc => {

    const el = document.createElement("div");

    el.className = "card";



    el.innerHTML = `

      <b>Account:</b> ${acc.account_id}<br>

      Balance: ${acc.balance}<br>

      Equity: ${acc.equity}<br>

      PnL: ${acc.axm_float_pct}%

    `;



    container.appendChild(el);

  });

}



// ===============================

// 🚀 LOAD DASHBOARD

// ===============================

async function loadDashboard() {

  const key = sessionStorage.getItem("key");

  const role = sessionStorage.getItem("role");



  const data = await fetchData();

  const filtered = filterData(data, key, role);



  render(filtered);

}



// ===============================

// 🔁 AUTO LOGIN (SESSION)

// ===============================

window.onload = () => {

  const key = sessionStorage.getItem("key");



  if (key) {

    document.getElementById("login").style.display = "none";

    document.getElementById("dash").style.display = "block";

    loadDashboard();

  } else {

    document.getElementById("login").style.display = "flex";

  }

};



</script></body>

</html>
