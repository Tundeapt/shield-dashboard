<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>SHIELD — Brockway Command</title><link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"><style>:root {  --gold:#C9A84C; --gold-dim:#8a6e2f; --green:#00E5A0; --red:#FF4060;  --bg:#080A0E; --surface:#0D1117; --surface2:#131920;  --border:rgba(201,168,76,0.15); --text:#E8E2D4; --muted:#5a5a6a;  --mono:'Space Mono',monospace; --display:'Syne',sans-serif;}*{margin:0;padding:0;box-sizing:border-box;}body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(201,168,76,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(201,168,76,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
/* LOGIN */#login-screen{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;}.login-box{border:1px solid var(--border);background:var(--surface);padding:48px 40px;width:100%;max-width:420px;position:relative;overflow:hidden;}.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:36px;}.login-logo img{width:48px;height:48px;border-radius:50%;object-fit:cover;}.login-logo-text h1{font-family:var(--display);font-weight:800;font-size:20px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;}.login-logo-text p{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:3px;}.login-label{display:block;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;}.login-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:16px;padding:14px 16px;outline:none;letter-spacing:2px;transition:border-color 0.2s;box-sizing:border-box;}.login-input:focus{border-color:var(--gold);}.login-input.shake{animation:shake 0.3s ease;}@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}.login-btn{width:100%;margin-top:16px;background:var(--gold);color:#000;border:none;font-family:var(--display);font-weight:800;font-size:13px;letter-spacing:3px;text-transform:uppercase;padding:16px;cursor:pointer;transition:opacity 0.2s;}.login-btn:hover{opacity:0.85;}.login-btn:disabled{opacity:0.4;cursor:not-allowed;}.login-error{margin-top:12px;font-size:11px;color:var(--red);letter-spacing:1px;text-align:center;min-height:16px;}.login-footer{margin-top:24px;font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;text-align:center;}
/* DASHBOARD */#dashboard{display:none;position:relative;z-index:1;}.wrap{max-width:1200px;margin:0 auto;padding:24px 20px;}header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--border);}.logo-area{display:flex;align-items:center;gap:14px;}.logo-area img{width:40px;height:40px;border-radius:50%;object-fit:cover;}.logo-area h1{font-family:var(--display);font-weight:800;font-size:18px;color:var(--gold);letter-spacing:4px;text-transform:uppercase;}.logo-area p{font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}.header-right{display:flex;align-items:center;gap:16px;}.pulse{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green);animation:pulse 2s infinite;}.pulse.off{background:var(--red);box-shadow:0 0 12px var(--red);animation:none;}@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(0.85);}}#status-text{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}#last-update{font-size:10px;color:var(--muted);}.signout-btn{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;background:none;border:1px solid var(--border);cursor:pointer;padding:6px 12px;}.signout-btn:hover{color:var(--gold);border-color:var(--gold);}
/* PROFILE TABS */.tabs{display:flex;gap:8px;margin-bottom:20px;}.tab{background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:8px 20px;cursor:pointer;transition:all 0.2s;}.tab:hover{border-color:var(--gold-dim);color:var(--text);}.tab.active{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.08);}
/* ACCOUNT BANNER */.banner{background:var(--surface);border:1px solid var(--border);padding:20px 28px;display:grid;grid-template-columns:repeat(4,1fr);margin-bottom:20px;position:relative;overflow:hidden;}.banner::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}.bstat{padding:0 20px;border-right:1px solid var(--border);}.bstat:first-child{padding-left:0;}.bstat:last-child{border-right:none;}.bstat label{display:block;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}.bstat .val{font-family:var(--display);font-size:22px;font-weight:700;color:var(--text);}.bstat .sub{font-size:11px;color:var(--muted);margin-top:4px;}.pos{color:var(--green)!important;}.neg{color:var(--red)!important;}
/* ENGINE CARDS */.engines{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}.engine{background:var(--surface);border:1px solid var(--border);padding:24px;position:relative;overflow:hidden;}.engine::after{content:'';position:absolute;top:0;left:0;bottom:0;width:2px;}.engine.axm::after{background:var(--gold);}.engine.pv::after{background:#7B5CF0;}.engine.throne::after{background:var(--gold);}.eng-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}.eng-name{font-family:var(--display);font-weight:800;font-size:13px;letter-spacing:3px;text-transform:uppercase;}.axm .eng-name{color:var(--gold);}.pv .eng-name{color:#7B5CF0;}.throne .eng-name{color:var(--gold);}.badge{font-size:10px;padding:3px 10px;border-radius:2px;letter-spacing:1px;text-transform:uppercase;}.badge-ok{background:rgba(0,229,160,0.12);color:var(--green);border:1px solid rgba(0,229,160,0.3);}.badge-warn{background:rgba(255,64,96,0.12);color:var(--red);border:1px solid rgba(255,64,96,0.3);}.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;}.stat{padding:14px;background:var(--surface2);border:1px solid rgba(255,255,255,0.04);}.stat label{display:block;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}.stat .v{font-family:var(--display);font-size:20px;font-weight:700;color:var(--text);}.bar-wrap{margin-top:14px;}.bar-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--muted);margin-bottom:6px;}.bar-track{height:3px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;}.bar-fill{height:100%;border-radius:2px;transition:width 0.6s ease;}.axm .bar-fill{background:var(--gold);}.pv .bar-fill{background:#7B5CF0;}.bar-fill.danger{background:var(--red)!important;}
/* STATUS ROW */.status-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}.stile{background:var(--surface);border:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;gap:12px;}.stile .icon{font-size:18px;}.stile .slabel{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:4px;}.stile .sval{font-family:var(--display);font-size:13px;font-weight:700;letter-spacing:1px;}.sval.ok{color:var(--green);}.sval.warn{color:var(--gold);}.sval.danger{color:var(--red);}
/* ERROR BANNER */.err-banner{background:rgba(255,64,96,0.08);border:1px solid rgba(255,64,96,0.3);padding:16px 20px;margin-bottom:16px;font-size:12px;color:var(--red);display:none;}
footer{margin-top:24px;padding-top:16px;border-top:1px solid var(--border);display:flex;justify-content:space-between;}footer p{font-size:10px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;}
/* LOADING */#loading-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;}.ring{width:48px;height:48px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}#loading-screen p{font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
@media(max-width:768px){.banner{grid-template-columns:1fr 1fr;}.engines{grid-template-columns:1fr;}.status-row{grid-template-columns:1fr 1fr;}}@media(max-width:480px){.banner{grid-template-columns:1fr;}.bstat{border-right:none;border-bottom:1px solid var(--border);padding:12px 0;}.bstat:last-child{border-bottom:none;}.status-row{grid-template-columns:1fr;}}</style></head><body>
